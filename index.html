<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SetForce Pro</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">

<style>
:root {
  --accent: #F97316;
  --accent-light: rgba(249, 115, 22, 0.15);
  --bg-main: #0A0A0A; --bg-card: #171717; 
  --border: #262626; --text-main: #FAFAFA; --text-muted: #A3A3A3;
  --red: #EF4444; --font-main: 'Inter', sans-serif;
  --radius: 12px;
}

body { font-family: var(--font-main); background: var(--bg-main); color: var(--text-main); margin: 0; padding: 0 16px; }

/* AUTH & NAV */
#auth-container { max-width: 400px; margin: 15vh auto; }
.nav { display:flex; gap:3px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 14px; padding: 4px; margin-bottom: 1.5rem; }
.nav-btn { flex:1; background:none; border:none; padding: 10px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; border-radius: 10px; transition: 0.2s; }
.nav-btn.active { background: var(--accent); color: #fff; }

.section { display:none; } .section.active { display:block; }

/* INPUTS & CARDS */
input, select, textarea { font-family: var(--font-main); background: var(--bg-main); color: #fff; border: 1.5px solid var(--border); border-radius: 8px; padding: 8px; outline: none; }
.ex-card { background: var(--bg-card); border: 1.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }

/* QUICK ADJUST BUTTONS */
.adj-wrap { display: flex; align-items: center; gap: 4px; background: var(--bg-main); border-radius: 8px; border: 1px solid var(--border); padding: 2px; }
.adj-btn { background: none; border: none; color: var(--text-muted); padding: 4px 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
.adj-btn:hover { color: var(--accent); }
.adj-val { width: 45px !important; border: none !important; text-align: center; padding: 0 !important; font-weight: 600; }

/* SETS GRID - Updated for RPE */
.set-cols { display:grid; grid-template-columns: 24px 1.2fr 1fr 65px 28px; gap:8px; align-items:center; margin-bottom:10px; }
.col-lbl { font-size:10px; color:var(--text-muted); text-align:center; text-transform: uppercase; font-weight: 700; }

/* BADGES */
.tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: var(--border); color: var(--text-muted); font-weight: 700; }
.rpe-badge { background: var(--accent-light); color: var(--accent); }
</style>
</head>
<body>

<div id="auth-container">
  <div class="ex-card">
    <h2 style="text-align:center; color:var(--accent);">SetForce Pro</h2>
    <input type="text" id="auth-username" placeholder="Username" style="width:100%; margin-bottom:12px;">
    <input type="password" id="auth-password" placeholder="Password (6+ chars)" style="width:100%; margin-bottom:20px;">
    <button onclick="login()" class="nav-btn active" style="width:100%; margin-bottom:10px;">Log In</button>
    <button onclick="register()" style="width:100%; background:none; border:none; color:var(--text-muted); font-size:12px; cursor:pointer;">Create Account</button>
    <div id="auth-msg" style="color:var(--red); text-align:center; margin-top:10px; font-size:12px;"></div>
  </div>
</div>

<div id="app-container" style="display:none; max-width: 600px; margin: 0 auto; padding-top: 1rem;">
  <div style="display:flex; justify-content:space-between; margin-bottom:1rem; align-items:center;">
    <span id="user-display" style="font-weight:700;"></span>
    <button onclick="logout()" style="background:none; border:none; color:var(--text-muted); cursor:pointer;"><i class="ti ti-logout"></i></button>
  </div>

  <nav class="nav">
    <button class="nav-btn active" onclick="switchTab('log')">Log</button>
    <button class="nav-btn" onclick="switchTab('history')">History</button>
    <button class="nav-btn" onclick="switchTab('progress')">Progress</button>
  </nav>

  <div id="tab-log" class="section active">
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:1rem;">
      <input type="date" id="log-date">
      <select id="log-type" onchange="handleTypeChange()"><option>Custom</option></select>
    </div>
    <div id="exercises-container"></div>
    <button onclick="addExercise()" style="width:100%; padding:12px; background:var(--bg-card); border:1.5px dashed var(--border); color:#fff; border-radius:12px; cursor:pointer; margin-bottom:1rem;">+ Add Exercise</button>
    <button id="save-btn" onclick="saveWorkout()" style="width:100%; padding:15px; background:var(--accent); border:none; color:#fff; font-weight:700; border-radius:12px; cursor:pointer;">Save Session</button>
    <div id="log-msg" style="text-align:center; margin-top:10px;"></div>
  </div>

  <div id="tab-history" class="section">
    <div id="history-list"></div>
  </div>

  <div id="tab-progress" class="section">
    <div class="ex-card">
        <div style="font-size:12px; color:var(--text-muted); margin-bottom:10px;">VOLUME DISTRIBUTION</div>
        <div id="volume-chart-container" style="display:flex; flex-direction:column; gap:8px;"></div>
    </div>
    <div id="progress-charts"></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAsWi38XXFe_aSaqo9fFm38-o7DC8MJNxk",
    authDomain: "workout-tracker-6d55b.firebaseapp.com",
    projectId: "workout-tracker-6d55b",
    storageBucket: "workout-tracker-6d55b.firebasestorage.app",
    messagingSenderId: "1045536771108",
    appId: "1:1045536771108:web:3d5d3fb1470e57cbe31cb1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  let currentUser = null, workouts = [], exCount = 0;
  const muscleGroups = ["Chest", "Back", "Legs", "Shoulders", "Arms", "Core"];

  // --- OFFLINE SYNC LOGIC ---
  // Save to localstorage as a backup
  function syncLocal(data) { localStorage.setItem('setforce_backup', JSON.stringify(data)); }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      currentUser = user;
      document.getElementById('user-display').textContent = user.email.split('@')[0].toUpperCase();
      document.getElementById('auth-container').style.display = 'none';
      document.getElementById('app-container').style.display = 'block';
      await loadData();
    } else {
      document.getElementById('auth-container').style.display = 'block';
      document.getElementById('app-container').style.display = 'none';
    }
  });

  window.login = () => signInWithEmailAndPassword(auth, document.getElementById('auth-username').value + "@setforce.app", document.getElementById('auth-password').value).catch(e => alert(e.message));
  window.register = () => createUserWithEmailAndPassword(auth, document.getElementById('auth-username').value + "@setforce.app", document.getElementById('auth-password').value).catch(e => alert(e.message));
  window.logout = () => signOut(auth);

  async function loadData() {
    const q = query(collection(db, "users", currentUser.uid, "workouts"), orderBy("date", "desc"));
    const snap = await getDocs(q);
    workouts = snap.docs.map(d => d.data());
    syncLocal(workouts);
    renderHistory();
    renderVolumeDistribution();
  }

  window.switchTab = (t) => {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === t));
    document.querySelectorAll('.section').forEach(s => s.classList.toggle('active', s.id === `tab-${t}`));
    if(t === 'progress') renderVolumeDistribution();
  };

  window.addExercise = (name='', group='Chest', sets=[{w:0, r:0, rpe:8}]) => {
    exCount++; const id = exCount;
    const div = document.createElement('div'); div.className = 'ex-card'; div.id = `ex-${id}`;
    div.innerHTML = `
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input type="text" id="exname-${id}" value="${name}" placeholder="Exercise Name" style="flex:2;">
        <select id="exgroup-${id}" style="flex:1;">
          ${muscleGroups.map(g => `<option ${g===group?'selected':''}>${g}</option>`).join('')}
        </select>
      </div>
      <div class="set-cols" style="margin-bottom:4px; opacity:0.6;">
        <span></span><span class="col-lbl">Weight</span><span class="col-lbl">Reps</span><span class="col-lbl">RPE</span><span></span>
      </div>
      <div id="sets-${id}"></div>
      <button onclick="addSet(${id})" style="width:100%; background:none; border:1px dashed var(--border); color:var(--text-muted); padding:8px; border-radius:8px; margin-top:8px; font-size:12px; cursor:pointer;">+ Add Set</button>
    `;
    document.getElementById('exercises-container').appendChild(div);
    sets.forEach(s => addSet(id, s.w, s.r, s.rpe));
  };

  window.addSet = (exId, w=0, r=0, rpe=8) => {
    const cont = document.getElementById(`sets-${exId}`);
    const row = document.createElement('div'); row.className = 'set-cols';
    row.innerHTML = `
      <span style="font-size:10px; font-weight:bold; color:var(--text-muted);">${cont.children.length + 1}</span>
      <div class="adj-wrap">
        <button class="adj-btn" onclick="adj(this, -5)">-</button>
        <input type="number" class="adj-val" value="${w}">
        <button class="adj-btn" onclick="adj(this, 5)">+</button>
      </div>
      <div class="adj-wrap">
        <button class="adj-btn" onclick="adj(this, -1)">-</button>
        <input type="number" class="adj-val" value="${r}">
        <button class="adj-btn" onclick="adj(this, 1)">+</button>
      </div>
      <select style="padding:4px; font-size:12px;">
        ${[10,9,8,7,6,5].map(v => `<option ${v==rpe?'selected':''}>${v}</option>`).join('')}
      </select>
      <button onclick="this.closest('.set-cols').remove()" style="background:none; border:none; color:var(--red); cursor:pointer;"><i class="ti ti-trash"></i></button>
    `;
    cont.appendChild(row);
  };

  window.adj = (btn, amt) => {
    const inp = btn.parentNode.querySelector('input');
    inp.value = Math.max(0, parseFloat(inp.value || 0) + amt);
  };

  window.saveWorkout = async () => {
    const btn = document.getElementById('save-btn');
    btn.textContent = "Syncing...";
    const exercises = Array.from(document.querySelectorAll('[id^="ex-"]')).map(div => {
        const id = div.id.split('-')[1];
        return {
            name: document.getElementById(`exname-${id}`).value,
            group: document.getElementById(`exgroup-${id}`).value,
            sets: Array.from(div.querySelectorAll('.set-cols')).map(row => {
                const inps = row.querySelectorAll('input');
                return { w: parseFloat(inps[0].value)||0, r: parseInt(inps[1].value)||0, rpe: parseInt(row.querySelector('select').value) };
            }).filter(s => s.r > 0)
        };
    }).filter(e => e.sets.length > 0);

    const workout = { id: Date.now().toString(), date: document.getElementById('log-date').value, exercises };
    await setDoc(doc(db, "users", currentUser.uid, "workouts", workout.id), workout);
    btn.textContent = "Save Session";
    loadData();
  };

  function renderHistory() {
    const cont = document.getElementById('history-list');
    cont.innerHTML = workouts.map(w => `
      <div class="ex-card">
        <div style="font-weight:bold; margin-bottom:8px; display:flex; justify-content:space-between;">
          <span>${w.date}</span>
          <span class="tag">${w.exercises.length} Exercises</span>
        </div>
        ${w.exercises.map(e => `
          <div style="margin-bottom:8px;">
            <div style="font-size:13px; font-weight:600;">${e.name} <span class="tag">${e.group}</span></div>
            <div style="display:flex; flex-wrap:wrap; gap:4px; margin-top:4px;">
              ${e.sets.map(s => `<span class="set-chip" style="font-size:11px; background:var(--bg-main); padding:3px 6px; border-radius:4px; border:1px solid var(--border);">${s.w}x${s.r} <span style="color:var(--accent); font-weight:bold;">@${s.rpe}</span></span>`).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    `).join('');
  }

  function renderVolumeDistribution() {
    const dist = {};
    muscleGroups.forEach(g => dist[g] = 0);
    workouts.slice(0, 5).forEach(w => {
        w.exercises.forEach(e => {
            const vol = e.sets.reduce((sum, s) => sum + (s.w * s.r), 0);
            if(dist[e.group] !== undefined) dist[e.group] += vol;
        });
    });

    const maxVol = Math.max(...Object.values(dist), 1);
    document.getElementById('volume-chart-container').innerHTML = Object.entries(dist).map(([group, vol]) => `
        <div style="font-size:11px; margin-bottom:2px;">${group}</div>
        <div style="width:100%; background:var(--border); height:8px; border-radius:4px; margin-bottom:8px;">
            <div style="width:${(vol/maxVol)*100}%; background:var(--accent); height:100%; border-radius:4px; transition:0.5s;"></div>
        </div>
    `).join('');
  }

  // Handle Routine templates
  window.handleTypeChange = () => { /* Logic from previous version can be added here */ };

  document.addEventListener('DOMContentLoaded', () => {
    // Basic service worker registration for PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    }
  });

</script>
</body>
</html>
